<!DOCTYPE HTML>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,user-scalable=0">
    <title>3D WebGL Sphere</title>
    
    <script>
        var jewel = {};
        // parseCollada() needs the jewel.dom.$ function
        jewel.dom = {};
        jewel.dom.$ = function(path, parent) {
            parent = parent || document;
            return parent.querySelectorAll(path);
        };
    </script>
    <script src="webgl-debug.js"></script>
    <script src="webgl.js"></script>
    <script src="requestAnimationFrame.js"></script>
    
</head>
<body>

    <canvas id="webgl" width="512" height="512"></canvas>

    <script>

        var webgl = jewel.webgl,
            canvas = document.getElementById("webgl"),
            gl = webgl.createContext(canvas);

        // enable debug mode
        gl = WebGLDebugUtils.makeDebugContext(gl);

        gl.clearColor(0.15,0.15,0.15,1);
        gl.enable(gl.DEPTH_TEST);

        var program = setupShaders(),
            geometry;
        
        webgl.loadModel(gl, "sphere.dae", function(geom) {
            geometry = geom;
        });

        gl.useProgram(program);


        var aVertex = gl.getAttribLocation(program, "aVertex");
        
        gl.enableVertexAttribArray(aVertex);
        
        webgl.setProjection(gl, program, 60, canvas.width / canvas.height, 0.1, 100);
    
        cycle(); // start rendering
        
        function cycle() {
            var rotation = Date.now() / 1000,
                axis = [0, 1, 0.5],
                position = [0, 0, -5];

            webgl.setModelView(gl, program, position, rotation, axis);
            
            if (geometry) {
                draw();
            }
            
            requestAnimationFrame(cycle);
        }

        function draw() {
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.viewport(0, 0, canvas.width, canvas.height);

            gl.bindBuffer(gl.ARRAY_BUFFER, geometry.vbo);
            gl.vertexAttribPointer(aVertex, 3, gl.FLOAT, false, 0, 0);
            
            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, geometry.ibo);
            gl.drawElements(gl.TRIANGLES, geometry.num, gl.UNSIGNED_SHORT, 0);
        }
        
        var tex = textureLoader.load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg')
    
            return webgl.createProgramObject(gl, tex);
        }

        
        
    </script>
    <style>
        body{
             display: flex;
  justify-content: center; /* 가로 중앙 */
  align-items: center;     /* 세로 중앙 */
  height: 100vh;    
        background-color:#262626;
        }
    </style>
    
    

</body>
</html>
